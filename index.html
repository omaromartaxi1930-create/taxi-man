<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طاكسي حمراء - حسابات</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; }
        /* اللون الأحمر ديال طاكسيات فاس */
        .header { background: #d32f2f; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header h2 { margin: 0; font-size: 24px; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button.test-btn { background: #1976d2; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .card { background: #fff; padding: 15px; margin-top: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-right: 5px solid #d32f2f; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; color: #2e7d32; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🚕 طاكسي حمراء</h2>
        </div>

        <!-- صفحة الدخول -->
        <div id="loginPage" class="page active">
            <h3 style="text-align:center; color: #333;">تسجيل الدخول للسائقين</h3>
            <input type="text" id="username" placeholder="أدخل اسمك هنا...">
            <button onclick="login()">تسجيل الدخول</button>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">
            
            <button class="test-btn" onclick="quickTest()">🧪 تجربة التطبيق فوراً</button>
        </div>

        <!-- صفحة الحسابات (الروصيطة) -->
        <div id="dashboardPage" class="page">
            <h3 style="color: #333;">مرحباً، <span id="driverName" style="color: #d32f2f;"></span></h3>
            
            <div class="card">
                <h4>إدخال حساب الوردية</h4>
                <input type="number" id="recette" placeholder="شحال الروصيطة؟ (درهم)">
                <input type="number" id="gazoil" placeholder="شحال المازوط؟ (درهم)">
                <button onclick="saveData()">حفظ الحساب</button>
            </div>

            <div id="result" class="result-box"></div>

            <button onclick="logout()" style="background:#757575; margin-top:40px;">رجوع / تسجيل الخروج</button>
        </div>
    </div>

    <!-- الكود لي كيخدم الأزرار -->
    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function login() {
            const user = document.getElementById('username').value;
            if(user.trim() !== "") {
                document.getElementById('driverName').innerText = user;
                showPage('dashboardPage');
            } else {
                alert("عافاك دخل السمية ديالك باش تدخل للحساب!");
            }
        }

        function quickTest() {
            document.getElementById('driverName').innerText = "شيفور تجريبي (عمر)";
            showPage('dashboardPage');
        }

        function logout() {
            document.getElementById('username').value = '';
            document.getElementById('recette').value = '';
            document.getElementById('gazoil').value = '';
            document.getElementById('result').style.display = 'none';
            showPage('loginPage');
        }

        function saveData() {
            const recette = document.getElementById('recette').value;
            const gazoil = document.getElementById('gazoil').value;
            const resultBox = document.getElementById('result');
            
            if(recette !== "" && gazoil !== "") {
                const safi = parseFloat(recette) - parseFloat(gazoil);
                resultBox.style.display = 'block';
                resultBox.innerHTML = "✅ تم حفظ الحساب بنجاح!<br><br>الصافي هو: " + safi + " درهم";
            } else {
                alert("عافاك دخل الروصيطة والمازوط بجوج!");
            }
        }
    </script>
</body>
</html>
